apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: spot-cluster
  region: us-east-1

managedNodeGroups:
- name: spot
  instanceTypes:
    - t3.medium
    - t3.large
    - m5.large
    - m5a.large
    - m5n.large
  spot: true
  desiredCapacity: 2







  
